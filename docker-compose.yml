#===============
# DOCKER COMPOSE
# Ensures internal networking is cleanly separated and logs are properly 
# rotated (max 10mb) to avoid disk exhaustion on smaller VPS machines.
#===============
version: "3.8"

services:
  amatsu-addon:
    image: "ghcr.io/mralanbourne/amatsu:latest"
    container_name: "amatsu_gateway"
    restart: "unless-stopped"
    ports:
      - "7002:7002"
    env_file:
      - ".env"
    environment:
      - "PORT=7002"
      - "NODE_ENV=production"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - "stremio-network"

networks:
  stremio-network:
    name: "stremio-internal-net"
    driver: "bridge"
